# https://taskfile.dev

version: '3'

tasks:
  default:
    cmds:
      - task --list-all

  tidy:
    cmds:
      - go fmt ./...
      - go mod tidy -v

  lint:
    cmds:
      - docker run --rm -v {{toSlash .ROOT_DIR}}:/app -w /app golangci/golangci-lint:v2.12.2 golangci-lint run -v --timeout 5m

  audit:
    cmds:
      - go vet ./...
      - go run honnef.co/go/tools/cmd/staticcheck@latest -checks=all,-ST1000,-U1000 ./...
      - go mod verify

  upgrade-libraries:
    cmds:
      - go get go@latest
      - go get -u ./...
      - go fmt ./...
      - go mod tidy
      - go mod verify

  build:
    cmds:
      - go build -ldflags='-s' gitblog/cmd/blog

  build-linux-amd64:
    env:
      GOOS: linux
      GOARCH: amd64
    cmds:
      - go build -ldflags='-s -w' -trimpath gitblog/cmd/blog

  install:
    cmds:
      - git pull
      - task: build
      - systemctl restart gitblog-go
